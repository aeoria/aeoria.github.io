<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - Fixed Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #e0e5ec;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;

            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(163, 177, 198, 0.6);
            
            --neu-outset: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            --neu-outset-sm: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
            --neu-inset: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            
            --neu-blue-outset: 6px 6px 14px rgba(0, 122, 255, 0.3), -6px -6px 14px rgba(100, 180, 255, 0.5);
            --neu-blue-active: inset 4px 4px 8px rgba(0, 100, 210, 0.4), inset -4px -4px 8px rgba(100, 180, 255, 0.5);
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .iphone-frame {
            width: 375px; height: 812px;
            background-color: var(--bg);
            border-radius: 44px; border: 8px solid #333;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; color: var(--text-main);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .status-bar { padding: 16px 24px 4px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; z-index: 10; }

        .header { padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .header-title h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header-title p { font-size: 13px; color: var(--text-muted); font-weight: 500; margin: 2px 0 0; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg); box-shadow: var(--neu-outset-sm); padding: 3px; }
        .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #d1d8e0; overflow: hidden; box-shadow: var(--neu-inset); display: flex; justify-content: center; align-items: flex-end; }

        .content { padding: 10px 24px 100px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .neu-card { background: var(--bg); border-radius: 24px; padding: 20px; box-shadow: var(--neu-outset); display: flex; flex-direction: column; margin-bottom: 24px; }
        
        /* Карта тела (Профиль) */
        .card-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text-main); }
        .body-profile-card { display: flex; flex-direction: row; justify-content: space-between; align-items: stretch; gap: 16px; }
        .body-info-col { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        
        .skin-type-tag { 
            display: inline-flex; align-items: center; gap: 8px; background: #e6ebf1; 
            box-shadow: var(--neu-outset-sm); padding: 10px 14px; border-radius: 12px; 
            font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; 
            align-self: flex-start; cursor: default;
        }
        .skin-type-tag span { color: var(--text-main); font-weight: 700; }
        
        .progress-stat { margin-bottom: 12px; }
        .progress-stat .val { font-size: 32px; font-weight: 700; color: var(--green); line-height: 1; }
        .progress-stat .total { font-size: 16px; color: var(--text-muted); font-weight: 600; }
        .progress-label { font-size: 13px; color: var(--text-main); font-weight: 600; margin-top: 6px; }
        
        .ai-status-link { font-size: 12px; font-weight: 600; color: var(--text-main); margin-top: auto; padding-top: 10px; display: flex; align-items: center; gap: 6px; }
        .ai-status-link .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

        .body-visual-col { width: 100px; border-radius: 20px; background: var(--bg); box-shadow: var(--neu-inset); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .silhouette { width: 45px; fill: #b8bdc4; }
        .real-marker { position: absolute; width: 8px; height: 8px; border-radius: 50%; }
        .rm-orange { background: var(--orange); top: 31%; left: 63%; box-shadow: 0 0 6px var(--orange); }
        .rm-green1 { background: var(--green); top: 48%; left: 30%; box-shadow: 0 0 6px var(--green); }
        .rm-green2 { background: var(--green); top: 62%; left: 68%; box-shadow: 0 0 6px var(--green); }

        /* --- ИСПРАВЛЕННЫЙ БЛОК ГИПЕРПЕРСОНАЛИЗАЦИИ --- */
        .hyper-title { 
            display: flex; align-items: center; gap: 8px; 
            font-size: 16px; font-weight: 700; color: var(--blue); 
            margin-bottom: 18px; 
        }
        .hyper-content { 
            display: flex; align-items: center; gap: 20px; 
        }
        
        /* Таймер */
        .timer-ring { 
            position: relative; width: 80px; height: 80px; 
            border-radius: 50%; box-shadow: var(--neu-inset); 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        .timer-center { 
            width: 60px; height: 60px; border-radius: 50%; background: var(--bg); 
            box-shadow: var(--neu-outset-sm); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2; 
        }
        .timer-center .time { font-size: 24px; font-weight: 700; color: var(--blue); line-height: 1; }
        .timer-center .unit { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-top: 2px;}
        
        /* Правая колонка информации */
        .hyper-info { 
            flex-grow: 1; display: flex; flex-direction: column; gap: 12px;
        }
        .hyper-text-group { display: flex; flex-direction: column; gap: 4px; }
        .hyper-info-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .hyper-info-desc { font-size: 11px; color: var(--text-muted); font-weight: 500; line-height: 1.3; }
        
        /* Ряд иконок экипировки */
        .gear-row { display: flex; gap: 12px; }
        .gear-btn { 
            width: 36px; height: 36px; border-radius: 10px; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; 
        }
        .gear-btn.active { 
            box-shadow: var(--neu-inset); color: var(--blue); 
        }
        .gear-btn.inactive { 
            box-shadow: var(--neu-outset-sm); color: #B0B0B0; 
        }

        /* Главная кнопка */
        .main-btn-wrapper { margin-bottom: 24px; text-align: center; }
        .main-btn { 
            width: 100%; background: var(--blue); color: white; border: none; 
            border-radius: 20px; padding: 20px; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 14px;
            box-shadow: var(--neu-blue-outset); cursor: pointer; transition: 0.2s;
        }
        .main-btn:active { box-shadow: var(--neu-blue-active); transform: scale(0.98); }
        .btn-text h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .btn-text p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; font-weight: 500; }

        /* Нижний Tab Bar */
        .tab-bar { position: absolute; bottom: 0; width: 100%; height: 90px; background: var(--bg); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; box-shadow: 0 -10px 20px var(--shadow-dark); border-radius: 0 0 36px 36px; z-index: 20; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
        .tab-item.active { color: var(--blue); }
        .sf-icon { width: 24px; height: 24px; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        
        .center-tab { position: relative; top: -15px; }
        .center-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; box-shadow: var(--neu-blue-outset); }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span style="letter-spacing: 2px;">📶 🔋</span> 
    </div>

    <header class="header">
        <div class="header-title">
            <h1>DermAI</h1>
            <p>Четверг, 19 марта</p>
        </div>
        <div class="avatar">
            <div class="avatar-inner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#8E8E93" style="margin-bottom: -2px;">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
        </div>
    </header>

    <div class="content">
        
        <div class="neu-card">
            <div class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Ваш профиль
            </div>
            
            <div class="body-profile-card">
                <div class="body-info-col">
                    <div class="skin-type-tag">
                        👱‍♀️ Тип II: <span>Светлая кожа</span>
                    </div>

                    <div class="progress-stat">
                        <span class="val">5</span> <span class="total">/ 90 зон</span>
                        <div class="progress-label">Отсканировано ИИ</div>
                    </div>

                    <div class="ai-status-link">
                        <div class="dot"></div>
                        <span>Стабильно</span>
                    </div>
                </div>

                <div class="body-visual-col">
                    <svg class="silhouette" viewBox="0 0 100 200">
                        <circle cx="50" cy="35" r="12" />
                        <rect x="38" y="50" width="24" height="45" />
                        <rect x="28" y="50" width="8" height="40" />
                        <rect x="64" y="50" width="8" height="40" />
                        <rect x="40" y="98" width="8" height="50" />
                        <rect x="52" y="98" width="8" height="50" />
                    </svg>
                    <div class="real-marker rm-orange"></div>
                    <div class="real-marker rm-green1"></div>
                    <div class="real-marker rm-green2"></div>
                </div>
            </div>
        </div>

        <div class="neu-card">
            <div class="hyper-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle></svg>
                Умный контроль солнца
            </div>
            
            <div class="hyper-content">
                <div class="timer-ring">
                    <svg viewBox="0 0 100 100" style="position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); z-index: 1;">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#d1d8e0" stroke-width="4"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="var(--blue)" stroke-width="4" stroke-dasharray="251" stroke-dashoffset="100" stroke-linecap="round"/>
                    </svg>
                    <div class="timer-center">
                        <span class="time">45</span>
                        <span class="unit">мин</span>
                    </div>
                </div>
                
                <div class="hyper-info">
                    <div class="hyper-text-group">
                        <div class="hyper-info-title">Лимит до ожога</div>
                        <div class="hyper-info-desc">Для Типа II (Светлая кожа) при текущем УФ рекомендуется взять с собой:</div>
                    </div>
                    
                    <div class="gear-row">
                        <div class="gear-btn active">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="10" width="10" height="11" rx="2"></rect><path d="M10 4v3"></path><path d="M14 4v3"></path><path d="M9 4h6a1 1 0 0 1 1 1v2H8V5a1 1 0 0 1 1-1z"></path><circle cx="12" cy="16" r="1"></circle></svg>
                        </div>
                        <div class="gear-btn active">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v12M12 14a2 2 0 0 0 2 2"></path><path d="M4 10a8 8 0 0 1 16 0H4z"></path></svg>
                        </div>
                        <div class="gear-btn inactive">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-3L14 3h-4L7 7H4v5h3v9h10v-9h3V7z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-btn-wrapper">
            <button class="main-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"></path>
                    <rect x="9" y="9" width="6" height="6" rx="1"></rect>
                </svg>
                <div class="btn-text" style="text-align: left;">
                    <h3>Начать первое<br>сканирование</h3>
                    <p>ИИ проанализирует родинку за 30 сек.</p>
                </div>
            </button>
        </div>

    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="4"></rect><circle cx="8.5" cy="8.5" r="2.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
            <span>Дневник</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <span>Защита</span>
        </div>
        <div class="tab-item center-tab">
            <div class="center-btn">
                <svg class="sf-icon" style="width: 28px; height: 28px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle></svg>
            </div>
            <span style="margin-top: 6px;">Скан</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>История</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Профиль</span>
        </div>
    </div>
</div>

</body>
</html>
