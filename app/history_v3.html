<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - History V3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #e0e5ec;
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --red: #FF3B30;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --neu-outset: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            --neu-inset: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        body { background-color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .iphone-frame { width: 375px; height: 812px; border-radius: 44px; border: 8px solid #333; position: relative; overflow: hidden; background-color: var(--bg); box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .status-bar { padding: 16px 24px 4px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-main); }
        .header { padding: 20px 24px; text-align: center; }
        .header h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .content { padding: 10px 16px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }

        /* КАРТОЧКА */
        .history-card {
            background: var(--bg);
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 26px;
            box-shadow: var(--neu-outset);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        /* ЭФФЕКТ КОЛОДЫ КАРТ (STACK) */
        .card-stack {
            position: relative;
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            margin-right: 10px; /* Отступ под вылет карт */
        }
        .stack-underlay-1, .stack-underlay-2 {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--bg);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 2px 2px 5px rgba(163, 177, 198, 0.4);
        }
        .stack-underlay-1 { transform: translate(4px, -4px); z-index: 1; opacity: 0.7; }
        .stack-underlay-2 { transform: translate(8px, -8px); z-index: 0; opacity: 0.4; }

        .mole-thumb {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            box-shadow: var(--neu-outset);
            border: 2px solid #fff;
        }

        .mole-info { flex-grow: 1; display: flex; flex-direction: column; gap: 2px; }
        .mole-meta { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .mole-name { font-size: 16px; font-weight: 800; color: var(--text-main); }
        .mole-status { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }

        /* ПРЯМОУГОЛЬНЫЙ ТАЙМЕР-ИНФОРМЕР */
        .check-timer-rect {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            background: var(--bg);
            box-shadow: var(--neu-inset);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 6px;
            border: 1px solid rgba(255, 149, 0, 0.1);
        }
        .timer-val { font-size: 10px; font-weight: 800; color: var(--red); margin-top: 2px; }
        .timer-label { font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;}
        
        /* Мини-шкала внутри таймера */
        .timer-mini-track {
            width: 100%; height: 4px; background: rgba(0,0,0,0.05); 
            border-radius: 2px; overflow: hidden; margin-top: 5px;
        }
        .timer-mini-fill {
            width: 100%; height: 100%; background: var(--orange);
        }

        /* TAB BAR */
        .tab-bar { height: 85px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; border-radius: 35px 35px 0 0; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
        .tab-item.active { color: var(--blue); }
        .scan-circle { width: 54px; height: 54px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4); margin-top: -30px; }

    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span>📶 🔋</span>
    </div>

    <header class="header">
        <h1>История</h1>
    </header>

    <div class="content">
        
        <div class="history-card">
            <div class="card-stack">
                <div class="stack-underlay-1"></div>
                <div class="stack-underlay-2"></div>
                <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1533038590840-1cde6e668a91?q=80&w=200&auto=format&fit=crop');"></div>
            </div>
            
            <div class="mole-info">
                <div class="mole-meta">Динамика • 3 скана</div>
                <div class="mole-name">Правое плечо</div>
                <div class="mole-status" style="color: var(--green);">
                    <div class="dot" style="background: var(--green);"></div>
                    Стабильно
                </div>
            </div>
            <div style="color: var(--text-muted);">›</div>
        </div>

        <div class="history-card">
            <div class="card-stack">
                <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop');"></div>
            </div>
            <div class="mole-info">
                <div class="mole-meta">Точка отсчета</div>
                <div class="mole-name">Грудь (центр)</div>
                <div class="mole-status" style="color: var(--text-muted);">Норма</div>
            </div>
            <div style="color: var(--text-muted);">›</div>
        </div>

        <div class="history-card">
            <div class="card-stack">
                <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1596755094514-f87e34085b2c?q=80&w=200&auto=format&fit=crop');"></div>
            </div>
            
            <div class="mole-info">
                <div class="mole-meta" style="color: var(--orange);">Внимание</div>
                <div class="mole-name">Левая лопатка</div>
                <div class="mole-status" style="color: var(--text-muted); font-size: 11px;">180д без контроля</div>
            </div>
            
            <div class="check-timer-rect">
                <div class="timer-label">Чекап</div>
                <span style="font-size: 20px;">⏰</span>
                <div class="timer-val">+12 дней</div>
                <div class="timer-mini-track">
                    <div class="timer-mini-fill"></div>
                </div>
            </div>
        </div>

        <div style="margin-top: 10px; padding: 22px; border-radius: 30px; background: linear-gradient(145deg, #f0f4f8, #d1d9e6); text-align: center; box-shadow: var(--neu-outset); border: 1px solid #fff;">
            <div style="font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 4px;">AI Evolution</div>
            <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 16px;">Сравните снимки за год в одно видео</p>
            <div style="color: var(--blue); font-size: 12px; font-weight: 800; letter-spacing: 0.5px;">РАЗБЛОКИРОВАТЬ ›</div>
        </div>

    </div>

    <div class="tab-bar">
        <div class="tab-item"><span>Moments</span></div>
        <div class="tab-item"><span>Care</span></div>
        <div class="tab-item"><div class="scan-circle"><span style="font-size: 20px;">[ ]</span></div></div>
        <div class="tab-item"><span>Tips</span></div>
        <div class="tab-item active"><span>History</span></div>
    </div>
</div>

</body>
</html>
