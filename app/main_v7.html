<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - Live API & Interactive Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #e0e5ec;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --red: #FF3B30;

            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(163, 177, 198, 0.6);
            
            --neu-outset: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            --neu-outset-sm: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
            --neu-inset: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            
            --neu-blue-outset: 6px 6px 14px rgba(0, 122, 255, 0.3), -6px -6px 14px rgba(100, 180, 255, 0.5);
            --neu-blue-active: inset 4px 4px 8px rgba(0, 100, 210, 0.4), inset -4px -4px 8px rgba(100, 180, 255, 0.5);
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .iphone-frame {
            width: 375px; height: 812px;
            background-color: var(--bg);
            border-radius: 44px; border: 8px solid #333;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; color: var(--text-main);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .status-bar { padding: 16px 24px 4px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; z-index: 10; }

        .header { padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .header-title h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header-title p { font-size: 13px; color: var(--text-muted); font-weight: 500; margin: 2px 0 0; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg); box-shadow: var(--neu-outset-sm); padding: 3px; }
        .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #d1d8e0; overflow: hidden; box-shadow: var(--neu-inset); display: flex; justify-content: center; align-items: flex-end; }

        .content { padding: 10px 24px 100px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .neu-card { background: var(--bg); border-radius: 24px; padding: 20px; box-shadow: var(--neu-outset); display: flex; flex-direction: column; margin-bottom: 24px; }
        
        /* УФ Виджет */
        .uv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .uv-location { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .uv-weather { font-size: 12px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .uv-right-info { text-align: right; }
        .uv-value-container { display: flex; align-items: baseline; gap: 6px; justify-content: flex-end; }
        .uv-value { font-size: 42px; font-weight: 700; line-height: 1; color: var(--orange); transition: 0.5s; }
        .uv-status { font-size: 14px; font-weight: 600; color: var(--text-main); }
        
        .uv-scale-track { height: 8px; border-radius: 4px; background: var(--bg); box-shadow: var(--neu-inset); display: flex; overflow: hidden; margin-bottom: 8px; }
        .uv-scale-fill { width: 25%; background: linear-gradient(to right, var(--green), var(--orange), var(--red)); border-radius: 4px; transition: width 1s ease-out; }
        .uv-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); font-weight: 600; margin-bottom: 16px; }
        
        .spf-banner { background: var(--bg); box-shadow: var(--neu-inset); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .spf-icon-box { width: 32px; height: 32px; border-radius: 8px; background: var(--bg); box-shadow: var(--neu-outset-sm); display: flex; align-items: center; justify-content: center; color: var(--blue); }

        /* Карта тела (Интерактивная) */
        .card-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text-main); transition: 0.3s;}
        .body-profile-card { display: flex; flex-direction: row; justify-content: space-between; align-items: stretch; gap: 16px; }
        .body-info-col { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        
        /* Кнопка/Тег фототипа */
        .skin-type-tag { 
            display: inline-flex; align-items: center; gap: 8px; background: var(--bg); 
            box-shadow: var(--neu-outset-sm); padding: 10px 14px; border-radius: 12px; 
            font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 16px; 
            align-self: flex-start; cursor: pointer; transition: all 0.25s ease; user-select: none;
        }
        /* Состояние из скриншота после клика */
        .skin-type-tag.filled { 
            color: var(--text-muted); box-shadow: var(--neu-outset-sm); cursor: default; 
            background: #e6ebf1; /* Чуть светлее фон как на скриншоте */
        }
        .skin-type-tag.filled span { color: var(--text-main); font-weight: 700; }
        
        /* Прогресс */
        .progress-stat { margin-bottom: 12px; transition: 0.3s; }
        .progress-stat .val { font-size: 32px; font-weight: 700; color: var(--text-muted); line-height: 1; opacity: 0.5; transition: 0.3s; }
        .progress-stat .total { font-size: 16px; color: var(--text-muted); font-weight: 600; opacity: 0.5; transition: 0.3s; }
        .progress-label { font-size: 13px; color: var(--text-main); font-weight: 600; margin-top: 6px; transition: 0.3s;}
        
        /* Статус ИИ внизу */
        .ai-status-link { font-size: 12px; font-weight: 600; color: var(--blue); margin-top: auto; padding-top: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .ai-status-link .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); display: none; }

        /* Силуэт */
        .body-visual-col { width: 100px; border-radius: 20px; background: var(--bg); box-shadow: var(--neu-inset); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .silhouette { width: 50px; fill: #b8bdc4; transition: 0.5s; opacity: 0.3; }
        
        @keyframes pulse-empty {
            0% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(0, 122, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
        }
        
        /* Стартовая пульсирующая точка */
        .mole-marker-empty { 
            position: absolute; width: 10px; height: 10px; border-radius: 50%; 
            background: var(--blue); animation: pulse-empty 2s infinite; 
            top: 40%; left: 50%; transform: translate(-50%, -50%); transition: all 0.4s ease;
        }

        /* Маркеры из скриншота (Скрыты по умолчанию) */
        .real-marker { position: absolute; width: 8px; height: 8px; border-radius: 50%; opacity: 0; transition: opacity 0.5s ease; }
        .rm-orange { background: var(--orange); top: 32%; left: 60%; box-shadow: 0 0 6px var(--orange); }
        .rm-green1 { background: var(--green); top: 44%; left: 34%; box-shadow: 0 0 6px var(--green); }
        .rm-green2 { background: var(--green); top: 56%; left: 66%; box-shadow: 0 0 6px var(--green); }

        /* Главная кнопка */
        .main-btn-wrapper { margin-bottom: 24px; text-align: center; }
        .main-btn { 
            width: 100%; background: var(--blue); color: white; border: none; 
            border-radius: 20px; padding: 20px; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 14px;
            box-shadow: var(--neu-blue-outset); cursor: pointer; transition: 0.2s;
        }
        .main-btn:active { box-shadow: var(--neu-blue-active); transform: scale(0.98); }
        .btn-text h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .btn-text p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; font-weight: 500; }

        /* Нижний Tab Bar */
        .tab-bar { position: absolute; bottom: 0; width: 100%; height: 90px; background: var(--bg); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; box-shadow: 0 -10px 20px var(--shadow-dark); border-radius: 0 0 36px 36px; z-index: 20; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
        .tab-item.active { color: var(--blue); }
        .sf-icon { width: 24px; height: 24px; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        
        .center-tab { position: relative; top: -15px; }
        .center-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; box-shadow: var(--neu-blue-outset); }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span style="letter-spacing: 2px;">📶 🔋</span> 
    </div>

    <header class="header">
        <div class="header-title">
            <h1>DermAI</h1>
            <p id="dateText">Четверг, 19 Марта</p>
        </div>
        <div class="avatar">
            <div class="avatar-inner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#8E8E93" style="margin-bottom: -2px;">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
        </div>
    </header>

    <div class="content">
        
        <div class="neu-card">
            <div class="uv-header">
                <div>
                    <div class="uv-location">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <span id="locText">Определение...</span>
                    </div>
                    <div class="uv-weather" id="weatherText">
                        <span>⏳</span> Загрузка погоды
                    </div>
                </div>
                <div class="uv-right-info">
                    <div style="font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; justify-content: flex-end;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="23" y2="12"></line></svg>
                        УФ-Индекс
                    </div>
                    <div class="uv-value-container">
                        <div class="uv-value" id="uvValue">...</div>
                        <div class="uv-status" id="uvStatus"></div>
                    </div>
                </div>
            </div>

            <div class="uv-scale-track">
                <div class="uv-scale-fill" id="uvScaleFill" style="width: 0%;"></div>
            </div>
            <div class="uv-labels">
                <span>0-2 Низк</span><span>3-5 Умер</span><span>6-7 Выс</span><span>8+ Экстр</span>
            </div>

            <div class="spf-banner">
                <div class="spf-icon-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M10 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM12 11v4M10 13h4"></path></svg>
                </div>
                <div style="font-size: 11px;">
                    <strong style="color: var(--text-main); font-size: 13px;">Нанесите SPF 30+</strong><br>
                    <span style="color: var(--text-muted);" id="uvPeakText">Пик УФ сегодня загружается...</span>
                </div>
            </div>
        </div>

        <div class="neu-card">
            <div class="card-title" id="profileTitle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Ваша карта тела
            </div>
            
            <div class="body-profile-card">
                <div class="body-info-col">
                    
                    <div class="skin-type-tag" id="phototypeBtn" onclick="addPhototypeData()">
                        <svg id="ptIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        <span id="ptText">Определить фототип кожи</span>
                    </div>

                    <div class="progress-stat">
                        <span class="val" id="progVal">0</span> <span class="total" id="progTotal">/ 90 зон</span>
                        <div class="progress-label" id="progLabel">Профиль пока пуст</div>

                    <div class="ai-status-link" id="actionLink">

                <div class="body-visual-col">

                        <circle cx="50" cy="35" r="14" />

                        <rect x="25" y="52" width="9" height="45" rx="2" />
                        <rect x="66" y="52" width="9" height="45" rx="2" />
                        <rect x="38" y="115" width="10" height="60" />
                        <rect x="52" y="115" width="10" height="60" />
                    </svg>
                    <div class="mole-marker-empty" id="startMarker"></div>
                    
                    <div class="real-marker rm-orange" id="rm1"></div>
                    <div class="real-marker rm-green1" id="rm2"></div>
                    <div class="real-marker rm-green2" id="rm3"></div>
                </div>
            </div>
        </div>

        <div class="main-btn-wrapper">
            <button class="main-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"></path>
                    <rect x="9" y="9" width="6" height="6" rx="1"></rect>
                </svg>
                <div class="btn-text" style="text-align: left;">
                    <h3>Начать первое сканирование</h3>
                    <p>ИИ проанализирует родинку за 30 сек.</p>

    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="4"></rect><circle cx="8.5" cy="8.5" r="2.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
            <span>Дневник</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <span>Защита</span>
        </div>
        <div class="tab-item center-tab">
            <div class="center-btn">
                <svg class="sf-icon" style="width: 28px; height: 28px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle></svg>
            </div>
            <span style="margin-top: 6px;">Скан</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>История</span>
        </div>
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Профиль</span>
        </div>
    </div>
</div>

<script>
    // --- 1. Анимация добавления данных (Интерактив) ---
    function addPhototypeData() {
        const btn = document.getElementById('phototypeBtn');
        
        // Эффект нажатия
        btn.style.boxShadow = "var(--neu-inset)";
        btn.style.transform = "scale(0.97)";

        setTimeout(() => {
            // 1. Меняем тег на данные из скриншота
            btn.style.boxShadow = "var(--neu-outset-sm)";
            btn.style.transform = "scale(1)";
            btn.classList.add('filled');
            btn.innerHTML = '👱‍♀️ Тип II: <span>Светлая кожа</span>';
            
            // 2. Обновляем заголовок профиля
            document.getElementById('profileTitle').innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Ваш профиль
            `;

            // 3. Обновляем цифры прогресса (как на скриншоте)
            const progVal = document.getElementById('progVal');
            progVal.innerText = "5";
            progVal.style.color = "var(--green)";
            progVal.style.opacity = "1";
            
            document.getElementById('progTotal').style.opacity = "1";
            
            const progLabel = document.getElementById('progLabel');
            progLabel.innerText = "Отсканировано ИИ";
            progLabel.style.color = "var(--text-muted)";
            
            // 4. Меняем ссылку на статус ИИ
            const actionLink = document.getElementById('actionLink');
            actionLink.style.color = "var(--text-main)";
            actionLink.style.cursor = "default";
            document.getElementById('statusDot').style.display = "block";
            document.getElementById('actionText').innerText = "Стабильно";
            
            // 5. Меняем силуэт и показываем реальные маркеры
            document.getElementById('startMarker').style.display = "none";
            document.getElementById('silhouetteBody').style.opacity = "1";
            document.getElementById('rm1').style.opacity = "1";
            document.getElementById('rm2').style.opacity = "1";
            document.getElementById('rm3').style.opacity = "1";
            
            btn.onclick = null; // Отключаем повторный клик
        }, 300);
    }

    // --- 2. Получение реальной погоды и локации (API) ---
    async function fetchWeatherAndLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // 1. Получаем город (BigDataCloud Reverse Geocoding - Бесплатно, без ключа)
                try {
                    const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`);
                    const geoData = await geoRes.json();
                    document.getElementById('locText').innerText = geoData.city || geoData.locality || "Ваш город";
                } catch(e) {
                    document.getElementById('locText').innerText = "Локация не найдена";
                }

                // 2. Получаем погоду и UV (Open-Meteo - Бесплатно, без ключа)
                try {
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=uv_index_max&timezone=auto`);
                    const weatherData = await weatherRes.json();
                    
                    const temp = Math.round(weatherData.current_weather.temperature);
                    const uvMax = weatherData.daily.uv_index_max[0];
                    
                    // Эмулируем текущий УФ (для реалистичности берем 70% от макса, если день)
                    const hour = new Date().getHours();
                    let currentUv = 0;
                    if(hour > 8 && hour < 18) {
                        currentUv = Math.round(uvMax * 0.7);
                    }
                    if(currentUv < 1) currentUv = 1; // минимум 1 для визуала днем

                    // Обновляем UI
                    document.getElementById('weatherText').innerHTML = `<span style="font-size: 16px;">🌡️</span> Ясно, ${temp}°C`;
                    document.getElementById('uvValue').innerText = currentUv;
                    document.getElementById('uvPeakText').innerText = `Пик УФ сегодня: ${uvMax}`;
                    
                    // Расчет бара (шкала до 11)
                    const percentage = Math.min((currentUv / 11) * 100, 100);
                    document.getElementById('uvScaleFill').style.width = `${percentage}%`;

                    // Статус УФ
                    let status = "Низк.";
                    if(currentUv >= 3 && currentUv <= 5) status = "Умерен.";
                    else if(currentUv >= 6 && currentUv <= 7) status = "Высок.";
                    else if(currentUv >= 8) status = "Экстр.";
                    document.getElementById('uvStatus').innerText = status;

                } catch(e) {
                    console.error("Ошибка погоды", e);
                }
            }, (error) => {
                // Если запретили геолокацию - ставим дефолт
                document.getElementById('locText').innerText = "Варшава";
                document.getElementById('weatherText').innerHTML = `<span style="font-size: 16px;">☀️</span> Ясно, 22°C`;
                document.getElementById('uvValue').innerText = "3";
                document.getElementById('uvStatus').innerText = "Умерен.";
                document.getElementById('uvScaleFill').style.width = "30%";
                document.getElementById('uvPeakText').innerText = "Пик УФ сегодня: 5 (в 14:00)";
            });
        }
    }

    // Запускаем при загрузке
    window.onload = () => {
        // Ставим текущую дату
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        let dateStr = new Date().toLocaleDateString('ru-RU', options);
        // Делаем первую букву заглавной
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        document.getElementById('dateText').innerText = dateStr;
        
        // Запрос гео/погоды
        fetchWeatherAndLocation();
    };
</script>

</body>
</html>
