<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #44475a;
            --accent-color: #007AFF;
            --shadow-light: -6px -6px 12px rgba(255, 255, 255, 1);
            --shadow-dark: 6px 6px 12px rgba(163, 177, 198, 0.6);
            --shadow-inset: inset 4px 4px 8px rgba(163, 177, 198, 0.5), 
                            inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #1a1a1a; /* Темный фон вокруг "телефона" */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Контейнер имитирующий iPhone */
        .iphone-frame {
            width: 375px;
            height: 812px;
            background-color: var(--bg-color);
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-bar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        header {
            padding: 10px 25px;
        }

        h1 { font-size: 28px; margin: 0; }

        .content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Карточки в стиле Neumorphism */
        .card {
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--shadow-light), var(--shadow-dark);
            padding: 20px;
            margin-bottom: 25px;
        }

        /* Секция УФ-индекса */
        .uv-section {
            display: flex;
            justify-content: flex-end;
            text-align: center;
        }

        .uv-meter {
            width: 100px;
        }

        .uv-value {
            font-size: 42px;
            font-weight: 600;
            display: block;
            margin-top: -10px;
        }

        .uv-label {
            font-size: 12px;
            background: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            box-shadow: var(--shadow-dark);
        }

        /* Кнопка сканирования */
        .scan-btn-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .scan-main-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: 600;
            flex-grow: 1;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
        }

        .scan-preview {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #d1d9e6;
            box-shadow: var(--shadow-inset);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mole-spot {
            width: 40px;
            height: 35px;
            background: #4a3728;
            border-radius: 50% 40% 60% 30%;
            filter: blur(2px);
        }

        /* Прогресс-бар секция */
        .progress-title { font-weight: 600; margin-bottom: 5px; font-size: 18px; }
        .progress-subtext { font-size: 13px; opacity: 0.8; margin-bottom: 15px; }

        .slider-container {
            margin: 20px 0;
        }

        .slider-track {
            height: 10px;
            background: #e0e5ec;
            border-radius: 5px;
            box-shadow: var(--shadow-inset);
            position: relative;
        }

        .slider-fill {
            width: 15%;
            height: 100%;
            background: #a2d2a2;
            border-radius: 5px;
        }

        .slider-thumb {
            width: 20px;
            height: 20px;
            background: #a2d2a2;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            left: 15%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toggle-row {
            display: flex;
            background: #d1d9e6;
            border-radius: 15px;
            box-shadow: var(--shadow-inset);
            padding: 4px;
            margin-top: 15px;
        }

        .toggle-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .toggle-item.active {
            background: #a2d2a2;
            color: white;
            border-radius: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Нижняя навигация */
        .tab-bar {
            height: 85px;
            background: var(--bg-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            box-shadow: 0 -5px 15px rgba(163, 177, 198, 0.4);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #888;
        }

        .tab-item.active { color: var(--accent-color); }

        .tab-icon-circle {
            width: 50px;
            height: 50px;
            background: #9f86ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-top: -30px;
            box-shadow: 0 10px 20px rgba(159, 134, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span>📶 🔋</span>
    </div>

    <header>
        <h1>DermAI</h1>
    </header>

    <div class="content">
        <div class="card uv-section">
            <div class="uv-meter">
                <span style="font-size: 10px; font-weight: 600;">УФ-Индекс</span>
                <div style="height: 10px; background: linear-gradient(to right, #4CAF50, #FFC107, #F44336); border-radius: 5px; margin: 5px 0;"></div>
                <span class="uv-value">3</span>
                <span class="uv-label">Низкий</span>
            </div>
        </div>

        <div class="card">
            <div class="scan-btn-container">
                <div style="flex-grow: 1;">
                    <button class="scan-main-btn">Начать сканирование [ ]</button>
                    <p style="font-size: 11px; margin: 8px 0 0 5px; opacity: 0.6;">Быстрая, 30-ти секундная проверка</p>
                </div>
                <div class="scan-preview">
                    <div class="mole-spot"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <div style="width: 60%;">
                    <div class="progress-title">Scan Progress</div>
                    <p class="progress-subtext">Now you are successfully checked 5/90 moles</p>
                </div>
                <div style="width: 60px; height: 80px; background: #eef2f7; border-radius: 10px;">
                    <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
                </div>
            </div>

            <div class="slider-container">
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 600;">
                    <span style="color: #a2d2a2;">5</span>
                    <span style="opacity: 0.4;">moles from</span>
                    <span style="opacity: 0.4;">90</span>
                </div>
                <div class="slider-track">
                    <div class="slider-fill"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>

            <div class="toggle-row">
                <div class="toggle-item active">kcal/day ✓</div>
                <div class="toggle-item">g/day</div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item">
            <span>🖼️</span>
            <span>Moments</span>
        </div>
        <div class="tab-item">
            <span>🛡️</span>
            <span>Care</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon-circle"> [ ] </div>
        </div>
        <div class="tab-item">
            <span>📖</span>
            <span>History</span>
        </div>
        <div class="tab-item">
            <span>💡</span>
            <span>Read</span>
        </div>
    </div>
</div>

</body>
</html>
