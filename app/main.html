<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - iOS Icons Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #44475a;
            --accent-color: #1e88e5;
            --violet-accent: #9f86ff;
            --green-accent: #4CAF50;
            --shadow-outset: 10px 10px 20px rgba(163, 177, 198, 0.4),
                              -10px -10px 20px rgba(255, 255, 255, 0.8);
            --shadow-inset: inset 6px 6px 12px rgba(163, 177, 198, 0.5), 
                            inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            --tab-shadow: 10px 10px 20px rgba(159, 134, 255, 0.4),
                           -10px -10px 20px rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .iphone-frame {
            width: 375px;
            height: 812px;
            background-color: var(--bg-color);
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 10px 10px 20px rgba(0,0,0,0.1);
        }

        .status-bar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        header { padding: 10px 25px; }
        h1 { font-size: 28px; margin: 0; }

        .content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .card {
            background: var(--bg-color);
            border-radius: 30px;
            box-shadow: var(--shadow-outset);
            padding: 25px;
            margin-bottom: 30px;
        }

        .uv-section { display: flex; justify-content: flex-end; text-align: center; }
        .uv-meter { width: 110px; }
        .uv-value { font-size: 48px; font-weight: 600; display: block; margin-top: -10px; }
        .uv-label {
            font-size: 13px;
            background: #ffffff;
            padding: 4px 12px;
            border-radius: 12px;
            box-shadow: var(--shadow-outset);
            display: inline-block;
        }

        .scan-btn-container { display: flex; align-items: center; gap: 15px; }
        .scan-main-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 18px 25px;
            border-radius: 20px;
            font-weight: 600;
            flex-grow: 1;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 8px 8px 16px rgba(10, 50, 100, 0.3),
                        -8px -8px 16px rgba(100, 150, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .scan-main-btn:active {
            box-shadow: inset 4px 4px 8px rgba(10, 50, 100, 0.3),
                        inset -4px -4px 8px rgba(100, 150, 255, 0.5);
        }

        .scan-preview {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            background: #e0e5ec;
            box-shadow: var(--shadow-inset);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mole-spot {
            width: 45px;
            height: 40px;
            background: #4a3728;
            border-radius: 50% 40% 60% 30%;
            filter: blur(4px);
        }

        .progress-title { font-weight: 600; margin-bottom: 8px; font-size: 19px; }
        .progress-subtext { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }

        .body-placeholder {
            width: 70px;
            height: 90px;
            background: #eef2f7;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-inset);
        }

        .slider-container { margin: 25px 0; }
        .slider-track {
            height: 12px;
            background: #e0e5ec;
            border-radius: 6px;
            box-shadow: var(--shadow-inset);
            position: relative;
        }
        .slider-fill {
            width: 15%;
            height: 100%;
            background: #a2d2a2;
            border-radius: 6px;
        }
        .slider-thumb {
            width: 24px;
            height: 24px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            left: 15%;
            box-shadow: var(--shadow-outset);
            cursor: pointer;
        }

        .toggle-row {
            display: flex;
            background: #e0e5ec;
            border-radius: 18px;
            box-shadow: var(--shadow-inset);
            padding: 4px;
            margin-top: 20px;
        }
        .toggle-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            margin: 0 4px;
        }
        .toggle-item.active {
            background: #ffffff;
            color: var(--green-accent);
            box-shadow: var(--shadow-outset);
        }

        /* Настройки Tab Bar и Иконок */
        .tab-bar {
            height: 90px;
            background: var(--bg-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 25px;
            box-shadow: 0 -10px 20px rgba(163, 177, 198, 0.4);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            color: #9aa0a6;
            cursor: pointer;
            transition: color 0.2s;
        }

        .tab-item.active { color: var(--accent-color); }

        /* Класс для стилизации SVG под SF Pro */
        .sf-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-icon-circle {
            width: 55px;
            height: 55px;
            background: var(--violet-accent);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-top: -35px;
            box-shadow: var(--tab-shadow);
        }

        .tab-icon-circle:active {
            box-shadow: inset 4px 4px 8px rgba(159, 134, 255, 0.4),
                        inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }
        
        /* Иконка сканера внутри центральной кнопки */
        .sf-icon-scanner {
            width: 26px;
            height: 26px;
            stroke-width: 2;
        }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span>📶 🔋</span> 
    </div>

    <header>
        <h1>DermAI</h1>
    </header>

    <div class="content">
        <div class="card uv-section">
            <div class="uv-meter">
                <span style="font-size: 11px; font-weight: 600;">УФ-Индекс</span>
                <div style="height: 12px; background: linear-gradient(to right, #4CAF50, #FFC107, #F44336); border-radius: 6px; margin: 8px 0;"></div>
                <span class="uv-value">3</span>
                <span class="uv-label">Низкий</span>
            </div>
        </div>

        <div class="card">
            <div class="scan-btn-container">
                <div style="flex-grow: 1;">
                    <button class="scan-main-btn">
                        Начать сканирование
                        <svg class="sf-icon sf-icon-scanner" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin:0;">
                            <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"></path>
                            <rect x="9" y="9" width="6" height="6" rx="1"></rect>
                        </svg>
                    </button>
                    <p style="font-size: 12px; margin: 10px 0 0 5px; opacity: 0.6;">Быстрая, 30-ти секундная проверка</p>
                </div>
                <div class="scan-preview">
                    <div class="mole-spot"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <div style="width: 65%;">
                    <div class="progress-title">Scan Progress</div>
                    <p class="progress-subtext">Now you are successfully checked 5/90 moles</p>
                </div>
                <div class="body-placeholder">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a0aabf" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="slider-container">
                <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; font-weight: 600;">
                    <span style="color: #a2d2a2;">5</span>
                    <span style="opacity: 0.4;">moles from</span>
                    <span style="opacity: 0.4;">90</span>
                </div>
                <div class="slider-track">
                    <div class="slider-fill"></div>
                    <div class="slider-thumb"></div>
                </div>
            </div>

            <div class="toggle-row">
                <div class="toggle-item active">kcal/day ✓</div>
                <div class="toggle-item">g/day</div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="3" width="18" height="18" rx="4"></rect>
                <circle cx="8.5" cy="8.5" r="2.5"></circle>
                <path d="M21 15l-5-5L5 21"></path>
            </svg>
            <span>Moments</span>
        </div>
        
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M12 8v8M8 12h8"></path>
            </svg>
            <span>Care</span>
        </div>
        
        <div class="tab-item">
            <div class="tab-icon-circle">
                <svg class="sf-icon sf-icon-scanner" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin:0;">
                    <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"></path>
                </svg>
            </div>
        </div>
        
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>History</span>
        </div>
        
        <div class="tab-item">
            <svg class="sf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5.76.76 1.23 1.52 1.41 2.5"></path>
            </svg>
            <span>Read</span>
        </div>
    </div>
</div>

</body>
</html>
