<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - Scan V7 Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #e0e5ec;
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --red: #FF3B30;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            --neu-inset: inset 6px 6px 12px rgba(163, 177, 198, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            --neu-outset: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        }

        body { background-color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .iphone-frame { width: 375px; height: 812px; border-radius: 44px; border: 8px solid #333; position: relative; overflow: hidden; background-color: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        #videoBg { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(20px); transform: scale(1.1); z-index: 1; opacity: 0.6; }
        .shutter-btn { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #fff; border-radius: 50%; border: 5px solid #1c1c1c; box-shadow: 0 0 0 3px #fff; z-index: 10; cursor: pointer; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 1000; pointer-events: none; transition: opacity 0.1s; }

        #testMenu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; color: white; }
        .test-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; margin: 10px 0; font-weight: 700; cursor: pointer; font-size: 16px; }

        .sheet { position: absolute; bottom: -100%; left: 0; right: 0; height: 92%; background: #fff; border-radius: 40px 40px 0 0; z-index: 100; padding: 20px; overflow-y: auto; scrollbar-width: none; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet.active { bottom: 0; }
        .handle { width: 40px; height: 4px; background: #E0E0E0; border-radius: 10px; margin: 0 auto 20px; }

        .baseline-badge { display: inline-flex; align-items: center; gap: 5px; background: #F2F2F7; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 12px; }
        
        .status-card { border-radius: 24px; padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; border: 1px solid rgba(0,0,0,0.03); }
        .status-card.green { background: #F6FFF9; }
        .status-card.red { background: #FFF6F6; }

        .check-icon { width: 48px; height: 48px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .green .check-icon { color: var(--green); }
        .red .check-icon { color: var(--red); }

        /* ABCDE GRID - Улучшено по V3 */
        .abcde-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .abcde-item { background: #F8F9FA; padding: 14px; border-radius: 20px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; }
        .abcde-letter { font-size: 22px; font-weight: 800; color: #E0E0E0; width: 20px; }
        .abcde-icon { font-size: 18px; opacity: 0.8; }
        .abcde-info { display: flex; flex-direction: column; gap: 2px; }
        .abcde-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
        .abcde-val { font-size: 13px; font-weight: 700; color: var(--text-main); }
        
        /* Progress bars inside grid */
        .abcde-bar-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #E9E9EB; }
        .abcde-bar-fill { height: 100%; transition: width 1s ease-out; }

        /* "E" evolution full width */
        .abcde-item.full { grid-column: span 2; }

        .recommendations { background: #fdfdfd; border-radius: 20px; padding: 16px; margin-bottom: 24px; border: 1px solid #f0f0f0; }
        .rec-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; font-size: 13px; color: #444; line-height: 1.4; }
        .rec-item:last-child { margin-bottom: 0; }
        .rec-icon { color: var(--blue); font-size: 14px; margin-top: 2px; }

        /* ПЛАН НАБЛЮДЕНИЯ - Идеал из V5 */
        .observation-card { background: #f4f7ff; border-radius: 28px; padding: 22px; border: 1.5px solid #eef2ff; position: relative; box-shadow: 0 10px 20px rgba(0,122,255,0.05); }
        .premium-tag { position: absolute; top: 22px; right: 22px; font-size: 10px; font-weight: 800; color: var(--blue); letter-spacing: 0.5px; }
        .obs-title { font-size: 17px; font-weight: 800; margin-bottom: 8px; color: #1a1a1a; }
        .obs-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5; }
        
        .timeline-visual { display: flex; align-items: center; gap: 18px; margin-bottom: 24px; }
        .mole-frame { width: 54px; height: 54px; border-radius: 16px; background: #fff; box-shadow: var(--neu-inset); display: flex; align-items: center; justify-content: center; }
        .mole-dot { width: 24px; height: 18px; background: #5c4033; border-radius: 40% 60% 70% 30%; filter: blur(0.3px); }
        .arrow { font-size: 18px; color: var(--blue); font-weight: 700; }
        .next-frame { width: 54px; height: 54px; border-radius: 16px; border: 2.5px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; color: #cbd5e0; font-size: 24px; font-weight: 700; background: rgba(255,255,255,0.5); }
        
        .cta-btn { width: 100%; background: var(--blue); color: white; border: none; padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,122,255,0.3); transition: transform 0.2s; }
        .cta-btn:active { transform: scale(0.97); }
        .cta-btn.red { background: var(--red); box-shadow: 0 8px 25px rgba(255,59,48,0.3); }

        .risk-alert { background: #FFF6F6; padding: 16px; border-radius: 20px; border: 1px solid rgba(255,59,48,0.1); margin-bottom: 24px; }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="flash" id="flash"></div>
    <video id="videoBg" autoplay playsinline muted></video>
    <div class="shutter-btn" onclick="showTestMenu()"></div>

    <div id="testMenu">
        <h2 style="margin-bottom:10px">🔬 Тест Scan V7</h2>
        <p style="font-size:14px; opacity:0.7; margin-bottom: 20px;">Выберите результат:</p>
        <button class="test-btn" style="background:var(--green); color:white" onclick="renderResult('safe')">ВСЕ В ПОРЯДКЕ</button>
        <button class="test-btn" style="background:var(--red); color:white" onclick="renderResult('risk')">ОБНАРУЖЕН РИСК</button>
    </div>

    <div class="sheet" id="resultSheet">
        <div class="handle"></div>
        <div id="contentInject"></div>
        <div style="height: 40px;"></div>
    </div>
</div>

<script>
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('videoBg').srcObject = stream;
        } catch (e) { console.log("Камера недоступна"); }
    }

    function showTestMenu() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { 
            flash.style.opacity = '0';
            document.getElementById('testMenu').style.display = 'flex';
        }, 100);
    }

    function renderResult(type) {
        document.getElementById('testMenu').style.display = 'none';
        const container = document.getElementById('contentInject');
        
        if(type === 'safe') {
            container.innerHTML = `
                <div class="baseline-badge"><span>✨</span> ЭТАЛОННЫЙ СКАН СОЗДАН</div>
                <div class="status-card green">
                    <div class="check-icon">✓</div>
                    <div><h2>Все в порядке</h2><p>Риск: Низкий (2%)</p></div>
                </div>

                <div class="abcde-grid">
                    <div class="abcde-item">
                        <span class="abcde-letter">A</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Асимметрия</span>
                            <span class="abcde-val">Симметрично</span>
                        </div>
                        <div class="abcde-bar-bg"><div class="abcde-bar-fill" style="width:98%; background:var(--green)"></div></div>
                    </div>
                    <div class="abcde-item">
                        <span class="abcde-letter">B</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Границы</span>
                            <span class="abcde-val">Четкие, ровные</span>
                        </div>
                        <div class="abcde-bar-bg"><div class="abcde-bar-fill" style="width:95%; background:var(--green)"></div></div>
                    </div>
                    <div class="abcde-item">
                        <span class="abcde-letter">C</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Цвет</span>
                            <span class="abcde-val">Однородный</span>
                        </div>
                        <div class="abcde-bar-bg"><div class="abcde-bar-fill" style="width:100%; background:var(--green)"></div></div>
                    </div>
                    <div class="abcde-item">
                        <span class="abcde-letter">D</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Диаметр</span>
                            <span class="abcde-val">3.2 мм</span>
                        </div>
                        <div class="abcde-bar-bg"><div class="abcde-bar-fill" style="width:90%; background:var(--green)"></div></div>
                    </div>
                    <div class="abcde-item full">
                        <span class="abcde-letter">E</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Развитие</span>
                            <span class="abcde-val">Без изменений (Baseline)</span>
                        </div>
                        <div class="abcde-icon">🕒</div>
                    </div>
                </div>

                <div class="recommendations">
                    <div class="rec-item"><span class="rec-icon">🔘</span><span>Продолжайте ежемесячный осмотр этой зоны.</span></div>
                    <div class="rec-item"><span class="rec-icon">📅</span><span>Следующий ИИ-чек через 180 дней.</span></div>
                </div>

                <div class="observation-card">
                    <div class="premium-tag">PREMIUM</div>
                    <div class="obs-title">План наблюдения</div>
                    <div class="obs-desc">ИИ сохранил снимок в историю. Мы уведомим вас, когда придет время для сравнения.</div>
                    
                    <div class="timeline-visual">
                        <div class="mole-frame"><div class="mole-dot"></div></div>
                        <div class="arrow">→</div>
                        <div class="next-frame">?</div>
                        <div>
                            <div style="font-size: 13px; font-weight: 700;">Сентябрь 2026</div>
                            <div style="font-size: 11px; color: var(--text-muted);">Сравнение динамики</div>
                        </div>
                    </div>
                    <button class="cta-btn">Активировать таймлапс</button>
                </div>`;
        } else {
            container.innerHTML = `
                <div class="baseline-badge" style="color:var(--red); background:#FFF0F0"><span>⚠️</span> ТРЕБУЕТ ВНИМАНИЯ</div>
                <div class="status-card red">
                    <div class="check-icon">!</div>
                    <div><h2>Есть риск</h2><p>Риск: Средний (42%)</p></div>
                </div>

                <div class="abcde-grid">
                    <div class="abcde-item" style="border-bottom: 3px solid var(--red)">
                        <span class="abcde-letter" style="color:var(--red)">A</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Асимметрия</span>
                            <span class="abcde-val">Асимметрично</span>
                        </div>
                    </div>
                    <div class="abcde-item">
                        <span class="abcde-letter">B</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Границы</span>
                            <span class="abcde-val">Четкие</span>
                        </div>
                    </div>
                    <div class="abcde-item" style="border-bottom: 3px solid var(--orange)">
                        <span class="abcde-letter" style="color:var(--orange)">C</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Цвет</span>
                            <span class="abcde-val">Неоднородный</span>
                        </div>
                    </div>
                    <div class="abcde-item">
                        <span class="abcde-letter">D</span>
                        <div class="abcde-info">
                            <span class="abcde-label">Диаметр</span>
                            <span class="abcde-val">5.1 мм</span>
                        </div>
                    </div>
                </div>

                <div class="risk-alert">
                    <h4 style="margin:0 0 8px; color:var(--red); font-size:15px">Рекомендация ИИ</h4>
                    <p style="font-size:13px; color:#666; margin:0; line-height:1.4">ИИ обнаружил нетипичные признаки. Рекомендуется консультация дерматолога в ближайшие 2 недели.</p>
                </div>
                
                <button class="cta-btn red">Скачать отчет для врача (PDF)</button>`;
        }
        document.getElementById('resultSheet').classList.add('active');
    }

    window.onload = initCamera;
</script>
</body>
</html>
