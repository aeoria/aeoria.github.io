<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - QA Test Flow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --bg: #e0e5ec;
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --neu-inset: inset 6px 6px 12px rgba(163, 177, 198, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            --neu-outset: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        }

        body { background-color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .iphone-frame { width: 375px; height: 812px; border-radius: 44px; border: 8px solid #333; position: relative; overflow: hidden; background-color: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        /* Камера */
        #videoBg { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(20px); transform: scale(1.1); z-index: 1; }
        #videoFg { position: absolute; top: -150px; left: -24px; width: 375px; height: 812px; object-fit: cover; }
        .viewfinder { position: absolute; top: 150px; left: 24px; right: 24px; height: 380px; border-radius: 40px; overflow: hidden; z-index: 5; border: 1px solid rgba(255,255,255,0.3); }

        /* UI элементов */
        .shutter-btn { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #fff; border-radius: 50%; border: 5px solid #1c1c1c; box-shadow: 0 0 0 3px #fff; z-index: 10; cursor: pointer; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 100; pointer-events: none; }

        /* СЕКРЕТНОЕ МЕНЮ ТЕСТИРОВАНИЯ */
        #testMenu { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 150; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; color: white; }
        .test-btn { width: 100%; padding: 18px; border-radius: 20px; border: none; margin: 10px 0; font-weight: 700; cursor: pointer; font-size: 16px; }
        
        /* BOTTOM SHEET */
        .sheet { position: absolute; bottom: -100%; left: 0; right: 0; height: 85%; background: #fff; border-radius: 40px 40px 0 0; z-index: 200; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); color: #2d3436; padding: 25px; overflow-y: auto; }
        .sheet.active { bottom: 0; }
        .handle { width: 50px; height: 5px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; }

        /* Стили плашки */
        .status-box { padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .status-box.green { background: #E9FBF0; color: var(--green); }
        .status-box.orange { background: #FFF4E5; color: var(--orange); }
        
        .abcde-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .abcde-item { background: #f8f9fa; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 8px; }
        .letter { font-weight: 800; opacity: 0.3; font-size: 20px; }

        /* ПЛАН НАБЛЮДЕНИЯ */
        .premium-plan { background: #f0f4f8; border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid #d1d9e6; }
        .timeline { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .slot { width: 40px; height: 40px; border-radius: 10px; background: #fff; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; }
        
        .cta-premium { width: 100%; background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="flash" id="flash"></div>
    <video id="videoBg" autoplay playsinline muted></video>
    <div class="viewfinder"><video id="videoFg" autoplay playsinline muted></video></div>
    
    <div class="shutter-btn" onclick="openTestMenu()"></div>

    <div id="testMenu">
        <h3>Лаборатория DermAI</h3>
        <p>Выберите результат анализа для теста:</p>
        <button class="test-btn" style="background: var(--green); color: white;" onclick="runFlow('safe')">Сценарий: ВСЕ ОК</button>
        <button class="test-btn" style="background: var(--orange); color: white;" onclick="runFlow('risk')">Сценарий: ЕСТЬ РИСК</button>
    </div>

    <div class="sheet" id="resultSheet">
        <div class="handle"></div>
        <div id="sheetContent"></div>
    </div>
</div>

<script>
    // Инициализация камеры
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('videoBg').srcObject = stream;
            document.getElementById('videoFg').srcObject = stream;
        } catch (e) { console.log("Камера недоступна"); }
    }

    function openTestMenu() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { 
            flash.style.opacity = '0';
            document.getElementById('testMenu').style.display = 'flex';
        }, 100);
    }

    function runFlow(type) {
        document.getElementById('testMenu').style.display = 'none';
        const content = document.getElementById('sheetContent');
        
        if (type === 'safe') {
            content.innerHTML = `
                <div class="status-box green">
                    <div style="width:30px; height:30px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center;">✔</div>
                    <div><strong>Все в порядке</strong><br><span style="font-size:12px">Риск: Низкий</span></div>
                </div>
                <div class="abcde-grid">
                    <div class="abcde-item"><span class="letter">A</span> <span>Симметрично</span></div>
                    <div class="abcde-item"><span class="letter">B</span> <span>Ровные края</span></div>
                </div>
                <div class="premium-plan">
                    <div style="display:flex; justify-content:space-between">
                        <strong>План наблюдения</strong>
                        <span style="color:var(--blue); font-size:10px; font-weight:800">PREMIUM</span>
                    </div>
                    <p style="font-size:11px; margin:5px 0">ИИ рекомендует повтор через 180 дней.</p>
                    <div class="timeline">
                        <div class="slot" style="border-style:solid; background:var(--bg)">🌑</div>
                        <span>→</span>
                        <div class="slot">?</div>
                        <div style="font-size:10px"><b>Сентябрь 2026</b><br>Сравнение динамики</div>
                    </div>
                    <button class="cta-premium">Активировать таймлапс</button>
                </div>
            `;
        } else {
            content.innerHTML = `
                <div class="status-box orange">
                    <div style="width:30px; height:30px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center;">⚠</div>
                    <div><strong>Требует внимания</strong><br><span style="font-size:12px">Риск: Средний</span></div>
                </div>
                <div class="abcde-grid">
                    <div class="abcde-item" style="border:1px solid var(--orange)"><span class="letter" style="color:var(--orange); opacity:1">A</span> <span>Асимметрия</span></div>
                    <div class="abcde-item"><span class="letter">B</span> <span>Ровные края</span></div>
                </div>
                <div style="margin-top:20px; padding:15px; border-radius:20px; background:#fdf2f2;">
                    <h4 style="margin:0; color:var(--red)">Рекомендация ИИ</h4>
                    <p style="font-size:12px">Обнаружены признаки неоднородности. Рекомендуется консультация специалиста.</p>
                    <button class="cta-premium" style="background:var(--red)">Подготовить отчет для врача (PDF)</button>
                </div>
            `;
        }
        
        document.getElementById('resultSheet').classList.add('active');
    }

    window.onload = initCamera;
</script>
</body>
</html>
