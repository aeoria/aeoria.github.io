<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - Scan V6 (Final Prototype)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #e0e5ec;
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --red: #FF3B30;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            --neu-inset: inset 6px 6px 12px rgba(163, 177, 198, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            --neu-outset: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        }

        body { background-color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .iphone-frame { width: 375px; height: 812px; border-radius: 44px; border: 8px solid #333; position: relative; overflow: hidden; background-color: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        /* Камера (Фон) */
        #videoBg { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(20px); transform: scale(1.1); z-index: 1; opacity: 0.6; }
        .shutter-btn { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #fff; border-radius: 50%; border: 5px solid #1c1c1c; box-shadow: 0 0 0 3px #fff; z-index: 10; cursor: pointer; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 1000; pointer-events: none; transition: opacity 0.1s; }

        /* TEST MENU */
        #testMenu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; color: white; }
        .test-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; margin: 10px 0; font-weight: 700; cursor: pointer; font-size: 16px; }

        /* BOTTOM SHEET */
        .sheet { position: absolute; bottom: -100%; left: 0; right: 0; height: 92%; background: #fff; border-radius: 40px 40px 0 0; z-index: 100; padding: 20px; overflow-y: auto; scrollbar-width: none; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet.active { bottom: 0; }
        .handle { width: 40px; height: 4px; background: #E0E0E0; border-radius: 10px; margin: 0 auto 20px; }

        /* СТИЛИ КОНТЕНТА */
        .baseline-badge { display: inline-flex; align-items: center; gap: 5px; background: #F2F2F7; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 12px; }
        
        .status-card { border-radius: 24px; padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .status-card.green { background: #F6FFF9; }
        .status-card.red { background: #FFF6F6; }

        .check-icon { width: 48px; height: 48px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .green .check-icon { color: var(--green); }
        .red .check-icon { color: var(--red); }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .metric-item { background: #F8F9FA; padding: 14px; border-radius: 18px; display: flex; flex-direction: column; gap: 6px; }
        .m-header { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
        .m-val { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .m-bar-bg { height: 4px; background: #E9E9EB; border-radius: 2px; overflow: hidden; }
        .m-bar-fill { height: 100%; border-radius: 2px; }

        /* ПАРАМЕТР "E" (Широкий) */
        .metric-item.full { grid-column: span 2; flex-direction: row; justify-content: space-between; align-items: center; }

        /* РЕКОМЕНДАЦИИ ИЗ V3 */
        .recommendations { margin-bottom: 25px; }
        .rec-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; font-size: 13px; color: #444; line-height: 1.4; }
        .rec-icon { color: var(--blue); font-size: 16px; margin-top: 2px; }

        /* ПЛАН НАБЛЮДЕНИЯ */
        .observation-card { background: #f4f7ff; border-radius: 28px; padding: 20px; border: 1.5px solid #eef2ff; position: relative; }
        .premium-tag { position: absolute; top: 20px; right: 20px; font-size: 10px; font-weight: 800; color: var(--blue); }
        .timeline-visual { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; margin-top: 15px; }
        .mole-frame { width: 50px; height: 50px; border-radius: 14px; background: #fff; box-shadow: var(--neu-inset); display: flex; align-items: center; justify-content: center; }
        .mole-dot { width: 22px; height: 18px; background: #5c4033; border-radius: 40% 60% 70% 30%; }
        .next-frame { width: 50px; height: 50px; border-radius: 14px; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; color: #cbd5e0; font-weight: 700; }

        .cta-btn { width: 100%; background: var(--blue); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,122,255,0.3); }
        .cta-btn.red { background: var(--red); box-shadow: 0 8px 20px rgba(255,59,48,0.3); }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="flash" id="flash"></div>
    <video id="videoBg" autoplay playsinline muted></video>
    <div class="shutter-btn" onclick="showTestMenu()"></div>

    <div id="testMenu">
        <h2 style="margin-bottom:10px">🧪 Режим теста</h2>
        <p style="font-size:14px; opacity:0.7">Выберите состояние для проверки флоу:</p>
        <button class="test-btn" style="background:var(--green); color:white" onclick="renderResult('safe')">Сценарий: ВСЕ ОК</button>
        <button class="test-btn" style="background:var(--red); color:white" onclick="renderResult('risk')">Сценарий: ЕСТЬ РИСК</button>
    </div>

    <div class="sheet" id="resultSheet">
        <div class="handle"></div>
        <div id="contentInject"></div>
    </div>
</div>

<script>
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('videoBg').srcObject = stream;
        } catch (e) { console.log("Камера недоступна"); }
    }

    function showTestMenu() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { 
            flash.style.opacity = '0';
            document.getElementById('testMenu').style.display = 'flex';
        }, 100);
    }

    function renderResult(type) {
        document.getElementById('testMenu').style.display = 'none';
        const container = document.getElementById('contentInject');
        
        if(type === 'safe') {
            container.innerHTML = `
                <div class="baseline-badge"><span>✨</span> ЭТАЛОННЫЙ СКАН СОЗДАН</div>
                <div class="status-card green">
                    <div class="check-icon">✓</div>
                    <div><h2>Все в порядке</h2><p>Риск: Низкий (2%)</p></div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-item"><div class="m-header">A Асимметрия</div><div class="m-val">98% нормы</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:98%; background:var(--green)"></div></div></div>
                    <div class="metric-item"><div class="m-header">B Границы</div><div class="m-val">Четкие</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:95%; background:var(--green)"></div></div></div>
                    <div class="metric-item"><div class="m-header">C Цвет</div><div class="m-val">Однородный</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:100%; background:var(--green)"></div></div></div>
                    <div class="metric-item"><div class="m-header">D Диаметр</div><div class="m-val">3.2 мм</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:90%; background:var(--green)"></div></div></div>
                    <div class="metric-item full"><div class="m-header">E Развитие</div><div class="m-val">Без изменений (Baseline)</div></div>
                </div>
                <div class="recommendations">
                    <div class="rec-item"><div class="rec-icon">🔘</div><span>Продолжайте ежемесячное самообследование.</span></div>
                    <div class="rec-item"><div class="rec-icon">📅</div><span>Следующий ИИ-чек через 6 месяцев.</span></div>
                    <div class="rec-item"><div class="rec-icon">☀️</div><span>Используйте SPF 50+ (Тип кожи II).</span></div>
                </div>
                <div class="observation-card">
                    <div class="premium-tag">PREMIUM</div>
                    <div style="font-weight:800">План наблюдения</div>
                    <div class="timeline-visual">
                        <div class="mole-frame"><div class="mole-dot"></div></div>
                        <div style="color:var(--blue)">→</div><div class="next-frame">?</div>
                        <div><div style="font-size:13px; font-weight:700">Сентябрь 2026</div><div style="font-size:11px; color:var(--text-muted)">Сравнение динамики</div></div>
                    </div>
                    <button class="cta-btn">Активировать таймлапс</button>
                </div>`;
        } else {
            container.innerHTML = `
                <div class="baseline-badge" style="color:var(--red)"><span>⚠️</span> ТРЕБУЕТ ВНИМАНИЯ</div>
                <div class="status-card red">
                    <div class="check-icon">!</div>
                    <div><h2>Есть отклонения</h2><p>Риск: Средний (45%)</p></div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-item" style="border:1px solid var(--red)"><div class="m-header" style="color:var(--red)">A Асимметрия</div><div class="m-val">60% (Высокая)</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:60%; background:var(--red)"></div></div></div>
                    <div class="metric-item"><div class="m-header">B Границы</div><div class="m-val">Четкие</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:90%; background:var(--green)"></div></div></div>
                    <div class="metric-item" style="border:1px solid var(--orange)"><div class="m-header" style="color:var(--orange)">C Цвет</div><div class="m-val">Неоднородный</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:70%; background:var(--orange)"></div></div></div>
                    <div class="metric-item"><div class="m-header">D Диаметр</div><div class="m-val">5.4 мм</div><div class="m-bar-bg"><div class="m-bar-fill" style="width:80%; background:var(--orange)"></div></div></div>
                </div>
                <div class="recommendations" style="background:#FFF6F6; padding:15px; border-radius:20px;">
                    <h4 style="margin:0 0 10px; color:var(--red)">Срочный протокол:</h4>
                    <div class="rec-item"><span>1. Не пытайтесь удалить или травмировать зону.</span></div>
                    <div class="rec-item"><span>2. Покажите этот отчет дерматологу.</span></div>
                </div>
                <button class="cta-btn red" style="margin-top:20px">Скачать PDF-отчет для врача</button>`;
        }
        document.getElementById('resultSheet').classList.add('active');
    }

    window.onload = initCamera;
</script>
</body>
</html>
