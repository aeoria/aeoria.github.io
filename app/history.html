<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI - История сканов</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #e0e5ec;
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --text-main: #2d3436;
            --text-muted: #8E8E93;
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(163, 177, 198, 0.7);
            --neu-outset: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            --neu-inset: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        body { background-color: #1a1a1a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .iphone-frame { 
            width: 375px; height: 812px; border-radius: 44px; border: 8px solid #333; 
            position: relative; overflow: hidden; background-color: var(--bg); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }

        .status-bar { padding: 16px 24px 4px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-main); }

        .header { padding: 20px 24px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; color: var(--text-main); }

        .content { padding: 10px 20px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        /* ЭЛЕМЕНТ СПИСКА */
        .history-card {
            background: var(--bg);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: var(--neu-outset);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .history-card:active { transform: scale(0.98); box-shadow: var(--neu-inset); }

        .mole-thumb {
            width: 64px; height: 64px; border-radius: 16px;
            background-size: cover; background-position: center;
            box-shadow: var(--neu-inset); border: 2px solid #fff;
            flex-shrink: 0; position: relative;
        }

        .mole-info { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
        
        .mole-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
        .mole-name { font-size: 16px; font-weight: 800; color: var(--text-main); }
        .mole-status { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* БЕЙДЖИ */
        .badge {
            padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 800;
            background: var(--bg); box-shadow: var(--neu-outset);
        }
        .badge-count { color: var(--blue); }
        .badge-new { color: var(--green); }

        /* СПЕЦИФИЧЕСКИЕ СТИЛИ ДЛЯ КАРТОЧЕК */
        .card-reminder { border: 1.5px solid rgba(255, 149, 0, 0.3); }
        .reminder-icon { color: var(--orange); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* TAB BAR (Glassmorphism) */
        .tab-bar {
            height: 85px; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around; 
            align-items: center; padding-bottom: 20px; border-radius: 35px 35px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
        .tab-item.active { color: var(--blue); }
        .scan-circle {
            width: 50px; height: 50px; border-radius: 50%; background: var(--blue);
            display: flex; align-items: center; justify-content: center; color: white;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4); margin-top: -30px;
        }

    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="status-bar">
        <span>13:13</span>
        <span>📶 🔋</span>
    </div>

    <header class="header">
        <h1>История</h1>
    </header>

    <div class="content">
        <div class="history-card">
            <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1533038590840-1cde6e668a91?q=80&w=200&auto=format&fit=crop');"></div>
            <div class="mole-info">
                <div class="mole-meta">
                    <span class="badge badge-count">2 проверки</span>
                    <span>19 марта, 12:40</span>
                </div>
                <div class="mole-name">Правое плечо</div>
                <div class="mole-status" style="color: var(--green);">
                    <div class="status-dot" style="background: var(--green);"></div>
                    Стабильно
                </div>
            </div>
            <div style="color: var(--text-muted);">›</div>
        </div>

        <div class="history-card">
            <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop');"></div>
            <div class="mole-info">
                <div class="mole-meta">
                    <span class="badge badge-new">Точка отсчета</span>
                    <span>Вчера, 18:00</span>
                </div>
                <div class="mole-name">Грудь (центр)</div>
                <div class="mole-status" style="color: var(--text-muted);">
                    Без патологий
                </div>
            </div>
            <div style="color: var(--text-muted);">›</div>
        </div>

        <div class="history-card card-reminder">
            <div class="mole-thumb" style="background-image: url('https://images.unsplash.com/photo-1596755094514-f87e34085b2c?q=80&w=200&auto=format&fit=crop');">
                <div style="position:absolute; top:-5px; right:-5px; background:var(--orange); width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>
            </div>
            <div class="mole-info">
                <div class="mole-meta">
                    <span style="color: var(--orange);">⏰ Пора проверить</span>
                </div>
                <div class="mole-name">Левая лопатка</div>
                <div class="mole-status" style="color: var(--orange);">
                    Прошло 180 дней
                </div>
            </div>
            <div class="reminder-icon">📷</div>
        </div>

        <div style="margin-top: 30px; padding: 20px; border-radius: 20px; background: linear-gradient(145deg, #f0f4f8, #d1d9e6); text-align: center; box-shadow: var(--neu-outset);">
            <div style="font-size: 14px; font-weight: 800; margin-bottom: 8px;">Разблокируйте Таймлапс</div>
            <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 12px;">Следите за эволюцией родинок в Premium режиме</p>
            <div style="color: var(--blue); font-size: 12px; font-weight: 700;">Подробнее ›</div>
        </div>

    </div>

    <div class="tab-bar">
        <div class="tab-item">
            <span>Moments</span>
        </div>
        <div class="tab-item">
            <span>Care</span>
        </div>
        <div class="tab-item">
            <div class="scan-circle">
                <span style="font-size: 20px;">[ ]</span>
            </div>
        </div>
        <div class="tab-item">
            <span>Tips</span>
        </div>
        <div class="tab-item active">
            <span>History</span>
        </div>
    </div>
</div>

</body>
</html>
